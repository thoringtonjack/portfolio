<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@maya.designs · Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --surface2: #f3f0eb;
  --border: #e8e2d9;
  --border2: #d4ccc0;
  --text: #1a1714;
  --text-mid: #4a4540;
  --text-muted: #8a8078;
  --accent: #c9622f;
  --accent2: #e8a87c;
  --accent-pale: #fdf0e8;
  --gold: #b8954a;
  --sage: #6b7c5e;
  --mauve: #8b6f7a;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:50;background:rgba(250,248,245,0.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:13px 24px}
.brand{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;letter-spacing:0.08em;color:var(--text-mid)}
.brand b{color:var(--text);font-weight:600}

/* PROFILE */
.profile-header{max-width:935px;margin:0 auto;padding:52px 24px 36px;display:flex;gap:72px;align-items:flex-start}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar-ring{width:156px;height:156px;border-radius:50%;padding:3px;background:conic-gradient(from 0deg,var(--accent),var(--gold),var(--mauve),var(--sage),var(--accent));animation:spinring 8s linear infinite}
@keyframes spinring{to{rotate:360deg}}
.avatar-inner{width:100%;height:100%;border-radius:50%;border:4px solid var(--bg);overflow:hidden;background:var(--surface2)}
.avatar-status{position:absolute;bottom:10px;right:10px;width:16px;height:16px;border-radius:50%;background:var(--sage);border:3px solid var(--bg)}
.profile-info{flex:1}
.profile-username{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;letter-spacing:0.02em;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.verified{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-family:'Instrument Sans',sans-serif;font-weight:600;display:inline-flex;align-items:center;justify-content:center}
.profile-stats{display:flex;gap:48px;margin-bottom:22px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;display:block}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em}
.profile-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--accent);margin-bottom:6px}
.profile-bio{font-size:13.5px;color:var(--text-mid);line-height:1.7;margin-bottom:10px;max-width:400px}
.profile-bio b{color:var(--text);font-weight:600}
.profile-link{font-size:13px;color:var(--accent);text-decoration:none;font-weight:500}
.profile-link:hover{text-decoration:underline}
.profile-actions{display:flex;gap:8px;margin-top:20px}
.btn{padding:8px 20px;border-radius:6px;font-family:'Instrument Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;border:none}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:hover{background:var(--accent);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text);border:1.5px solid var(--border2)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* STORY CIRCLES */
.stories-section{max-width:935px;margin:0 auto;padding:0 24px 36px}
.stories-scroll{display:flex;gap:24px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.stories-scroll::-webkit-scrollbar{display:none}
.story-circle{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;transition:transform 0.2s}
.story-circle:hover{transform:scale(1.05)}
.story-ring{width:76px;height:76px;border-radius:50%;padding:2.5px;background:conic-gradient(from 0deg,var(--accent),var(--gold),var(--mauve),var(--sage),var(--accent));transition:all 0.2s}
.story-ring.seen{background:var(--border2)}
.story-inner{width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--surface2)}
.story-inner svg{width:100%;height:100%;display:block}
.story-label{font-size:11px;color:var(--text-mid);text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TABS */
.tabs{max-width:935px;margin:0 auto;border-top:1px solid var(--border);display:flex;justify-content:center}
.tab{padding:14px 32px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-top:1.5px solid transparent;margin-top:-1px;transition:all 0.2s;font-weight:500}
.tab.active{border-top-color:var(--text);color:var(--text)}
.tab:hover:not(.active){color:var(--text-mid)}

/* GRID */
.grid-section{max-width:935px;margin:0 auto;padding:3px 24px 80px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.grid-item{aspect-ratio:1;position:relative;overflow:hidden;cursor:pointer;background:var(--surface2)}
.grid-item:hover .grid-overlay{opacity:1}
.grid-item:hover .grid-art{transform:scale(1.04)}
.grid-art{width:100%;height:100%;transition:transform 0.4s cubic-bezier(.25,.46,.45,.94);display:flex;align-items:center;justify-content:center;overflow:hidden}
.grid-art svg{width:100%;height:100%;display:block}
.grid-overlay{position:absolute;inset:0;background:rgba(26,23,20,0.55);opacity:0;transition:opacity 0.3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.overlay-stats{display:flex;gap:24px}
.overlay-stat{display:flex;align-items:center;gap:5px;color:#fff;font-weight:600;font-size:15px}
.overlay-title{font-family:'Cormorant Garamond',serif;font-size:14px;color:rgba(255,255,255,0.85);text-align:center;max-width:80%}

/* POST MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(26,23,20,0.72);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:920px;max-height:92vh;display:flex;overflow:hidden;border:1px solid var(--border);transform:scale(0.95) translateY(16px);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 32px 80px rgba(0,0,0,0.22)}
.modal-backdrop.open .modal{transform:scale(1) translateY(0)}
.modal-image{width:54%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:480px;background:var(--surface2)}
.modal-image svg{width:100%;height:100%;display:block}
.modal-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;color:#fff;font-weight:600}
.modal-username{font-size:13.5px;font-weight:600;color:var(--text)}
.modal-sub{font-size:11px;color:var(--text-muted)}
.modal-close{margin-left:auto;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{flex:1;overflow-y:auto;padding:18px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.modal-caption{font-size:13.5px;line-height:1.65;color:var(--text-mid);margin-bottom:16px}
.modal-caption b{color:var(--text);font-weight:600}
.modal-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.tag{padding:3px 9px;border-radius:4px;font-size:11px;letter-spacing:0.03em;border:1px solid var(--border);color:var(--text-muted);transition:all 0.2s;cursor:default}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.tag.cat{color:var(--accent);border-color:rgba(201,98,47,0.3);background:var(--accent-pale)}
.modal-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.meta-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.meta-card .num{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--accent);display:block;font-weight:600}
.meta-card .lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}
.comments-section{border-top:1px solid var(--border);padding-top:14px}
.comments-title{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px;font-weight:600}
.comment{display:flex;gap:9px;margin-bottom:14px}
.comment-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--border)}
.comment-user{font-size:12px;font-weight:600;color:var(--text)}
.comment-text{font-size:12.5px;color:var(--text-mid);line-height:1.5;margin-top:2px}
.comment-time{font-size:10px;color:var(--text-muted);margin-top:3px}
.modal-footer{padding:14px 18px;border-top:1px solid var(--border)}
.like-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.icon-btn{background:none;border:none;font-size:21px;cursor:pointer;transition:transform 0.2s;padding:2px}
.icon-btn:hover{transform:scale(1.18)}
.likes-count{font-size:13px;font-weight:600;color:var(--text);flex:1}
.modal-date{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.comment-input-row{display:flex;gap:8px}
.comment-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:24px;padding:9px 16px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.comment-input:focus{border-color:var(--accent)}
.comment-input::placeholder{color:var(--text-muted)}
.send-btn{background:var(--text);color:var(--bg);border:none;border-radius:24px;padding:9px 18px;font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.send-btn:hover{background:var(--accent)}

/* ── STORY VIEWER (FULL SCREEN) ── */
.story-viewer{position:fixed;inset:0;z-index:1200;background:#0a0908;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.story-viewer.open{opacity:1;pointer-events:all}

.story-frame{position:relative;width:100%;max-width:430px;height:100vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(0.97);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1)}
.story-viewer.open .story-frame{transform:scale(1)}

/* Progress */
.story-progress-row{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;gap:4px;padding:14px 14px 0}
.story-bar-wrap{flex:1;height:2.5px;background:rgba(255,255,255,0.28);border-radius:2px;overflow:hidden}
.story-bar-fill{height:100%;width:0%;background:#fff;border-radius:2px}
.story-bar-fill.done{width:100%}
.story-bar-fill.playing{animation:storyprog 5s linear forwards}
@keyframes storyprog{from{width:0%}to{width:100%}}

/* Story header */
.story-header{position:absolute;top:24px;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;padding:0 14px}
.story-avatar{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,0.8);background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:17px;color:#fff;flex-shrink:0}
.story-uname{font-size:13px;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.4)}
.story-time-txt{font-size:11px;color:rgba(255,255,255,0.65)}
.story-close{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.8);font-size:24px;cursor:pointer;line-height:1;padding:4px;transition:color 0.2s}
.story-close:hover{color:#fff}

/* Story artwork */
.story-art-area{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.story-art-area svg{width:100%;height:100%;display:block}

/* Tap zones */
.story-tap-prev,.story-tap-next{position:absolute;top:0;bottom:0;width:38%;z-index:10;cursor:pointer}
.story-tap-prev{left:0}
.story-tap-next{right:0}

/* Caption overlay */
.story-caption-area{position:absolute;bottom:0;left:0;right:0;z-index:15;background:linear-gradient(to top,rgba(0,0,0,0.78) 0%,transparent 100%);padding:60px 22px 36px}
.story-cap-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:#fff;margin-bottom:7px;letter-spacing:0.03em;text-shadow:0 1px 6px rgba(0,0,0,0.3)}
.story-cap-text{font-size:13px;color:rgba(255,255,255,0.82);line-height:1.55}
.story-cta{display:inline-block;margin-top:16px;background:rgba(255,255,255,0.16);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:9px 20px;border-radius:24px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.07em;text-transform:uppercase}
.story-cta:hover{background:rgba(255,255,255,0.28)}

/* Side nav arrows (desktop) */
.story-nav-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:30;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);color:#fff;width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.story-nav-btn:hover{background:rgba(255,255,255,0.25)}
.story-nav-prev{left:-58px}
.story-nav-next{right:-58px}

@media(max-width:700px){
  .profile-header{flex-direction:column;gap:24px;padding:28px 16px 20px}
  .modal{flex-direction:column;max-height:95vh}
  .modal-image{width:100%;min-height:220px}
  .grid-section{padding:3px 0 60px}
  .story-nav-btn{display:none}
}
</style>
</head>
<body>

<nav><div class="brand"><b>maya.designs</b></div></nav>

<div class="profile-header">
  <div class="avatar-wrap">
    <div class="avatar-ring">
      <div class="avatar-inner" id="avatarInner"></div>
    </div>
    <div class="avatar-status"></div>
  </div>
  <div class="profile-info">
    <div class="profile-username">maya.designs <span class="verified">✓</span></div>
    <div class="profile-stats">
      <div class="stat"><span class="stat-num">12</span><span class="stat-label">Projects</span></div>
      <div class="stat"><span class="stat-num">8.4k</span><span class="stat-label">Followers</span></div>
      <div class="stat"><span class="stat-num">341</span><span class="stat-label">Following</span></div>
    </div>
    <div class="profile-name">Maya Okafor</div>
    <div class="profile-bio"><b>Visual Designer &amp; Art Director</b><br>Brand identity · Editorial · Motion · Type<br>Available for freelance — <b>London &amp; Remote</b></div>
    <a href="#" class="profile-link">🔗 mayaokafor.com</a>
    <div class="profile-actions">
      <button class="btn btn-primary">Follow</button>
      <button class="btn btn-secondary">Message</button>
      <button class="btn btn-secondary">↗ Behance</button>
    </div>
  </div>
</div>

<div class="stories-section"><div class="stories-scroll" id="storiesRow"></div></div>

<div class="tabs">
  <div class="tab active">⊞ Work</div>
  <div class="tab">♡ Saved</div>
  <div class="tab">⌂ Tagged</div>
</div>

<div class="grid-section"><div class="grid" id="grid"></div></div>

<!-- POST MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="bgCloseModal(event)">
  <div class="modal">
    <div class="modal-image" id="modalImage"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-avatar">M</div>
        <div><div class="modal-username">maya.designs</div><div class="modal-sub" id="modalSub"></div></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-caption" id="modalCaption"></div>
        <div class="modal-tags" id="modalTags"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="comments-section">
          <div class="comments-title">Comments</div>
          <div id="commentsList"></div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="like-row">
          <button class="icon-btn" id="likeBtn" onclick="toggleLike()">🤍</button>
          <button class="icon-btn" onclick="doShare(this)">↗</button>
          <button class="icon-btn" onclick="doBookmark(this)">🔖</button>
          <span class="likes-count" id="likesCount"></span>
        </div>
        <div class="modal-date" id="modalDate"></div>
        <div class="comment-input-row">
          <input class="comment-input" id="commentInput" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')submitComment()">
          <button class="send-btn" onclick="submitComment()">Post</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STORY VIEWER -->
<div class="story-viewer" id="storyViewer">
  <button class="story-nav-btn story-nav-prev" onclick="prevSlide()">‹</button>
  <div class="story-frame" id="storyFrame">
    <div class="story-progress-row" id="storyProgressRow"></div>
    <div class="story-header">
      <div class="story-avatar">M</div>
      <div><div class="story-uname">maya.designs</div><div class="story-time-txt" id="storyTimeTxt"></div></div>
      <button class="story-close" onclick="closeStory()">✕</button>
    </div>
    <div class="story-art-area" id="storyArtArea"></div>
    <div class="story-tap-prev" onclick="prevSlide()"></div>
    <div class="story-tap-next" onclick="nextSlide()"></div>
    <div class="story-caption-area" id="storyCaptionArea"></div>
  </div>
  <button class="story-nav-btn story-nav-next" onclick="nextSlide()">›</button>
</div>

<script>
// ── ART GENERATORS ────────────────────────────────────────────────────────────

function artAvatar() {
  return `<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
    <rect width="150" height="150" fill="#f0e6d3"/>
    <ellipse cx="75" cy="65" rx="34" ry="38" fill="#e8c9a0"/>
    <ellipse cx="75" cy="55" rx="28" ry="22" fill="#2a1f15" opacity="0.85"/>
    <path d="M47 70 Q75 110 103 70" fill="#f2d4a8"/>
    <circle cx="63" cy="72" r="4.5" fill="#2a1f15"/>
    <circle cx="87" cy="72" r="4.5" fill="#2a1f15"/>
    <circle cx="64.5" cy="70.5" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="88.5" cy="70.5" r="1.5" fill="#fff" opacity="0.6"/>
    <path d="M65 84 Q75 90 85 84" stroke="#c9622f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M35 115 Q35 150 115 150 L115 115 Q90 125 75 125 Q60 125 35 115Z" fill="#c9622f" opacity="0.9"/>
  </svg>`;
}

function artBrand(w,h){w=w||800;h=h||800;return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <rect width="${w}" height="${h}" fill="#fdf6ed"/>
  <circle cx="${w/2}" cy="${h*0.45}" r="${w*0.38}" fill="none" stroke="#c9622f" stroke-width="${w*0.012}"/>
  <circle cx="${w/2}" cy="${h*0.45}" r="${w*0.28}" fill="#c9622f" opacity="0.1"/>
  <polygon points="${w/2},${h*0.15} ${w*0.83},${h*0.7} ${w*0.17},${h*0.7}" fill="none" stroke="#1a1714" stroke-width="${w*0.007}"/>
  <text x="${w/2}" y="${h*0.46}" text-anchor="middle" dominant-baseline="middle" font-family="Georgia,serif" font-size="${w*0.09}" fill="#1a1714" letter-spacing="5">NOVA</text>
  <text x="${w/2}" y="${h*0.59}" text-anchor="middle" font-family="Georgia,serif" font-size="${w*0.022}" fill="#8a8078" letter-spacing="12">STUDIOS</text>
  <line x1="${w*0.3}" y1="${h*0.64}" x2="${w*0.7}" y2="${h*0.64}" stroke="#c9622f" stroke-width="${w*0.004}"/>
</svg>`;}

function artEditorial(w,h){w=w||800;h=h||800;return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <rect width="${w}" height="${h}" fill="#1a1714"/>
  <rect x="0" y="0" width="${w*0.5}" height="${h}" fill="#c9622f"/>
  <rect x="${w*0.46}" y="${h*0.12}" width="${w*0.5}" height="${h*0.76}" fill="#fdf6ed"/>

  document.getElementById('likesCount').textContent=`${p.likes.toLocaleString()} likes`;
  document.getElementById('likeBtn').textContent='🤍';
  document.getElementById('modalDate').textContent=p.date;
  document.getElementById('modalTags').innerHTML=p.tags.map((t,j)=>`<span class="tag${j===0?' cat':''}">#${t}</span>`).join('');
  document.getElementById('modalMeta').innerHTML=`<div class="meta-card"><span class="num">${p.views}</span><span class="lbl">Views</span></div><div class="meta-card"><span class="num">${p.saves}</span><span class="lbl">Saves</span></div><div class="meta-card"><span class="num">${p.likes}</span><span class="lbl">Likes</span></div>`;
  refreshComments(i);
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function refreshComments(i){
  document.getElementById('commentsList').innerHTML=projects[i].comments.map(c=>`<div class="comment"><div class="comment-avatar" style="background:${c.bg}">${c.em}</div><div class="comment-body"><span class="comment-user">${c.u}</span><div class="comment-text">${c.t}</div><div class="comment-time">${c.ago} ago</div></div></div>`).join('');
}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('open');document.body.style.overflow='';}
function bgCloseModal(e){if(e.target===document.getElementById('modalBackdrop'))closeModal();}
function toggleLike(){
  liked=!liked;
  projects[curPost].likes+=liked?1:-1;
  document.getElementById('likeBtn').textContent=liked?'❤️':'🤍';
  document.getElementById('likesCount').textContent=`${projects[curPost].likes.toLocaleString()} likes`;
}
function doShare(b){b.textContent='✓';setTimeout(()=>b.textContent='↗',1500);}
function doBookmark(b){b.textContent=b.textContent==='🔖'?'📌':'🔖';}
function submitComment(){
  const inp=document.getElementById('commentInput');
  const txt=inp.value.trim();if(!txt)return;
  projects[curPost].comments.unshift({u:'you',em:'😊',bg:'#fdf6ed',t:txt,ago:'just now'});
  inp.value='';refreshComments(curPost);
}

// ── STORY VIEWER ──────────────────────────────────────────────────────────────
let sIdx=0, slIdx=0, sTimer=null, seenSet=new Set();

function openStory(i){
  sIdx=i; slIdx=0;
  seenSet.add(i);
  document.getElementById(`sring${i}`)?.classList.add('seen');
  document.getElementById('storyViewer').classList.add('open');
  document.body.style.overflow='hidden';
  renderSlide();
}

function renderSlide(){
  clearTimeout(sTimer);
  const story=storyData[sIdx];
  const slide=story.slides[slIdx];
  const fh = window.innerHeight;
  const fw = Math.min(430, window.innerWidth);

  // Progress bars
  document.getElementById('storyProgressRow').innerHTML=story.slides.map((_,i)=>`<div class="story-bar-wrap"><div class="story-bar-fill${i<slIdx?' done':i===slIdx?' playing':''}" ></div></div>`).join('');

  document.getElementById('storyTimeTxt').textContent=slide.time+' ago';
  document.getElementById('storyArtArea').innerHTML=slide.artFn(fw, fh);
  document.getElementById('storyCaptionArea').innerHTML=`<div class="story-cap-title">${slide.title}</div><div class="story-cap-text">${slide.body}</div><div class="story-cta">View Project ↗</div>`;

  sTimer=setTimeout(()=>nextSlide(),5000);
}

function nextSlide(){
  const story=storyData[sIdx];
  if(slIdx<story.slides.length-1){slIdx++;renderSlide();}
  else if(sIdx<storyData.length-1){sIdx++;slIdx=0;seenSet.add(sIdx);document.getElementById(`sring${sIdx}`)?.classList.add('seen');renderSlide();}
  else closeStory();
}
function prevSlide(){
  if(slIdx>0){slIdx--;renderSlide();}
  else if(sIdx>0){sIdx--;slIdx=storyData[sIdx].slides.length-1;renderSlide();}
}
function closeStory(){clearTimeout(sTimer);document.getElementById('storyViewer').classList.remove('open');document.body.style.overflow='';}

// Tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');});
});

// Keyboard
document.addEventListener('keydown',e=>{
  const sv=document.getElementById('storyViewer').classList.contains('open');
  const mv=document.getElementById('modalBackdrop').classList.contains('open');
  if(e.key==='Escape'){sv?closeStory():mv?closeModal():null;}
  if(sv&&e.key==='ArrowRight')nextSlide();
  if(sv&&e.key==='ArrowLeft')prevSlide();
  if(mv&&!sv){
    if(e.key==='ArrowRight')openModal((curPost+1)%projects.length);
    if(e.key==='ArrowLeft')openModal((curPost-1+projects.length)%projects.length);
  }
});

renderStoryCircles();
renderGrid();
</script>
